syntax = "proto3";

package manifold.v1;

option go_package = "github.com/pierre/manifold/spec/manifold/v1;manifoldspecv1";

import "google/protobuf/struct.proto";
import "manifold/v1/types.proto";

// Checkpoint is the latest recoverable boundary for one pipeline.
message Checkpoint {
  string pipeline_id = 1;
  bytes source_cursor = 2;
  repeated CheckpointFrame frontier = 3;
  bool paused = 4;
}

// CheckpointFrame captures one in-flight frontier item that should resume at one segment.
message CheckpointFrame {
  string origin_record_id = 1;
  string record_id = 2;
  uint64 attempt_id = 3;
  repeated string parent_ids = 4;
  repeated string segment_path = 5;
  string next_segment_id = 6;
  google.protobuf.Value payload = 7;
  map<string, string> metadata = 8;
}

// SegmentState captures framework-managed resumable state for one segment attempt.
message SegmentState {
  string pipeline_id = 1;
  string segment_id = 2;
  string record_id = 3;
  uint64 attempt_id = 4;
  bytes snapshot = 5;
}

// SegmentCommit captures one durable segment outcome.
message SegmentCommit {
  string pipeline_id = 1;
  string origin_record_id = 2;
  string record_id = 3;
  repeated string parent_ids = 4;
  string segment_id = 5;
  uint64 attempt_id = 6;
  AckStatus status = 7;
  optional string error_message = 8;
}

// SegmentOutputRecord captures one intermediate output emitted by one segment.
message SegmentOutputRecord {
  string pipeline_id = 1;
  string segment_id = 2;
  Envelope item = 3;
}

// TerminalRecord captures one durable terminal output.
message TerminalRecord {
  string pipeline_id = 1;
  Envelope item = 2;
}

// TraceRecord groups terminal outputs for one source identity.
message TraceRecord {
  string source_record_id = 1;
  repeated Envelope outputs = 2;
}
